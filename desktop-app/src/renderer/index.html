<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMM Pro Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f2; color: #333; display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 200px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; }
    .logo { padding: 0 16px 20px; font-size: 18px; font-weight: 700; color: #AFA9EC; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
    .nav-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 8px; transition: all 0.1s; }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(175,169,236,0.2); color: #AFA9EC; border-right: 2px solid #AFA9EC; }
    .nav-icon { font-size: 16px; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #fff; padding: 14px 24px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 16px; font-weight: 600; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* Cards */
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #333; }

    /* Form */
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid rgba(0,0,0,0.12); border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; transition: border 0.1s; }
    input:focus, select:focus, textarea:focus { border-color: #AFA9EC; }
    label { font-size: 12px; color: #888; margin-bottom: 4px; display: block; }
    .form-group { margin-bottom: 12px; }

    /* Buttons */
    .btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.1s; }
    .btn-primary { background: #7F77DD; color: #fff; }
    .btn-primary:hover { background: #6B63CC; }
    .btn-danger { background: #E24B4A; color: #fff; }
    .btn-danger:hover { background: #CC3B3A; }
    .btn-secondary { background: #f0efec; color: #555; }
    .btn-secondary:hover { background: #e5e4e0; }
    .btn-success { background: #1D9E75; color: #fff; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* Status badges */
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-success { background: #EAF3DE; color: #3B6D11; }
    .badge-error { background: #FCEBEB; color: #A32D2D; }
    .badge-warn { background: #FAEEDA; color: #633806; }
    .badge-info { background: #E6F1FB; color: #185FA5; }

    /* Log */
    .log-container { background: #1a1a2e; border-radius: 10px; padding: 14px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log-entry { padding: 2px 0; line-height: 1.5; }
    .log-entry.success { color: #4CAF50; }
    .log-entry.error { color: #F44336; }
    .log-entry.warn { color: #FF9800; }
    .log-entry.info { color: #90CAF9; }

    /* Account list */
    .account-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
    .account-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
    .platform-fb { background: #1877F2; }
    .platform-ig { background: #D4537E; }
    .platform-tt { background: #333; }
    .platform-tw { background: #1DA1F2; }

    /* Checkbox */
    .action-checkbox { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1.5px solid transparent; cursor: pointer; transition: all 0.1s; }
    .action-checkbox.checked { border-color: #7F77DD; background: #EEEDFE; }
    .action-checkbox input { display: none; }

    /* Status indicator */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-running { background: #4CAF50; animation: pulse 1s infinite; }
    .status-idle { background: #aaa; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #888; transition: all 0.1s; }
    .tab.active { background: #EEEDFE; color: #534AB7; font-weight: 500; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">🚀 SMM Pro</div>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="nav-icon">📊</span> Dashboard
    </div>
    <div class="nav-item" onclick="showPage('accounts')" id="nav-accounts">
      <span class="nav-icon">👤</span> Akun
    </div>
    <div class="nav-item" onclick="showPage('automation')" id="nav-automation">
      <span class="nav-icon">⚡</span> Automasi
    </div>
    <div class="nav-item" onclick="showPage('warmup')" id="nav-warmup">
      <span class="nav-icon">🔥</span> Warm Up
    </div>
    <div class="nav-item" onclick="showPage('logs')" id="nav-logs">
      <span class="nav-icon">📋</span> Log Aktivitas
    </div>
    <div class="nav-item" onclick="showPage('settings')" id="nav-settings">
      <span class="nav-icon">⚙️</span> Pengaturan
    </div>
  </div>

  <div class="main">
    <div class="header">
      <div class="header-title" id="page-title">Dashboard</div>
      <div id="status-indicator">
        <span class="status-dot status-idle" id="status-dot"></span>
        <span id="status-text" style="font-size:13px;color:#888">Idle</span>
      </div>
    </div>
    <div class="content" id="content">
      <!-- Content akan dirender oleh JS -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
