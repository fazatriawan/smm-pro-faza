version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smm-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: smmpr0_secret
    networks:
      - smm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - smm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smm-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_WS_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - smm-network

volumes:
  mongo_data:

networks:
  smm-network:
    driver: bridge
